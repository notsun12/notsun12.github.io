<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLM-4 Voice Link</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12161c;
    --panel: #1a2029;
    --panel-2: #212a35;
    --border: #2c3542;
    --text: #e7ebf0;
    --text-dim: #8793a3;
    --accent-rec: #ff5d4a;
    --accent-ready: #48d97a;
    --accent-warn: #e8a33d;
    --accent-cool: #4fb8e8;
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'IBM Plex Sans', -apple-system, system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 0%, rgba(79,184,232,0.06), transparent 45%),
      radial-gradient(circle at 80% 100%, rgba(255,93,74,0.05), transparent 45%);
    color: var(--text);
    font-family: var(--sans);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  :focus-visible {
    outline: 2px solid var(--accent-cool);
    outline-offset: 2px;
  }

  .console {
    width: min(560px, 100%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
    overflow: hidden;
  }

  /* ---- header / link bar ---- */
  .console-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .led {
    flex: 0 0 auto;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #4a5568;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .led.connecting { background: var(--accent-warn); animation: ledpulse 1s ease-in-out infinite; }
  .led.connected { background: var(--accent-ready); box-shadow: 0 0 8px var(--accent-ready); }
  .led.error { background: var(--accent-rec); box-shadow: 0 0 8px var(--accent-rec); }

  @keyframes ledpulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .console-title {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 12.5px;
    letter-spacing: 0.12em;
    text-transform: lowercase;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .link-row {
    display: flex;
    gap: 8px;
    flex: 1 1 260px;
    min-width: 0;
  }

  #serverUrl {
    flex: 1 1 auto;
    min-width: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 9px;
    border-radius: 6px;
  }

  button {
    font-family: var(--mono);
    cursor: pointer;
  }

  #connectBtn {
    flex: 0 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: lowercase;
    padding: 7px 12px;
    border-radius: 6px;
    transition: border-color 0.15s, color 0.15s;
  }
  #connectBtn:hover { border-color: var(--accent-cool); color: var(--accent-cool); }
  #connectBtn.is-connected { color: var(--accent-rec); }
  #connectBtn.is-connected:hover { border-color: var(--accent-rec); }

  /* ---- main panel ---- */
  .main-panel {
    padding: 32px 24px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .dial-wrap {
    position: relative;
    width: clamp(150px, 38vw, 190px);
    aspect-ratio: 1 / 1;
  }

  .dial-wrap svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-bg, .ring-level {
    fill: none;
    stroke-width: 4;
  }
  .ring-bg { stroke: var(--border); }
  .ring-level {
    stroke: var(--accent-rec);
    stroke-linecap: round;
    transition: stroke-dashoffset 0.08s linear, stroke 0.2s;
  }
  .ring-level.mode-waiting {
    stroke: var(--accent-warn);
    animation: ringspin 1.1s linear infinite;
  }
  @keyframes ringspin {
    to { transform: rotate(360deg); }
  }

  #talkBtn {
    position: absolute;
    inset: 14px;
    border-radius: 50%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s, transform 0.1s, color 0.15s;
  }
  #talkBtn:not(:disabled):hover { border-color: var(--accent-cool); }
  #talkBtn:not(:disabled):active { transform: scale(0.97); }
  #talkBtn:disabled { color: var(--text-dim); cursor: default; }
  #talkBtn.is-recording {
    background: rgba(255,93,74,0.12);
    border-color: var(--accent-rec);
    color: var(--accent-rec);
  }

  .hint {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    min-height: 16px;
  }

  /* ---- transcript ---- */
  .transcript-wrap {
    width: 100%;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .transcript-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px 0;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: lowercase;
    color: var(--text-dim);
  }
  .transcript-label button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-decoration: underline;
    padding: 0;
  }
  .transcript-label button:hover { color: var(--text); }

  #transcript {
    height: 180px;
    overflow-y: auto;
    padding: 10px 18px 16px;
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  #transcript .turn-divider {
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: lowercase;
    margin: 14px 0 6px;
    display: block;
  }
  #transcript .turn-divider:first-child { margin-top: 0; }
  #transcript .placeholder { color: var(--text-dim); }
  .cursor {
    display: inline-block;
    width: 7px;
    height: 14px;
    background: var(--accent-cool);
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ---- advanced settings ---- */
  details.advanced {
    border-top: 1px solid var(--border);
    background: var(--panel-2);
  }
  details.advanced summary {
    list-style: none;
    cursor: pointer;
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: lowercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }
  details.advanced summary::-webkit-details-marker { display: none; }
  details.advanced summary:before {
    content: '▸';
    font-size: 10px;
    transition: transform 0.15s;
  }
  details.advanced[open] summary:before { transform: rotate(90deg); }
  .advanced-body {
    padding: 4px 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .setting-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
  }
  .setting-row label { flex: 0 0 110px; }
  .setting-row input[type="range"] { flex: 1 1 auto; accent-color: var(--accent-cool); }
  .setting-row input[type="number"] {
    width: 80px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 7px;
    border-radius: 5px;
  }
  .setting-row .readout { width: 40px; color: var(--text); text-align: right; }

  .footnote {
    padding: 12px 18px 16px;
    font-size: 11px;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
    background: var(--panel-2);
    line-height: 1.5;
  }

  @media (prefers-reduced-motion: reduce) {
    .led.connecting, .ring-level.mode-waiting, .cursor { animation: none; }
  }
</style>
</head>
<body>

<div class="console">
  <div class="console-header">
    <span id="led" class="led"></span>
    <span class="console-title">voice link</span>
    <div class="link-row">
      <input id="serverUrl" type="text" value="ws://192.168.1.178:10000/ws_generate" spellcheck="false">
      <button id="connectBtn" type="button">Connect</button>
    </div>
  </div>

  <div class="main-panel">
    <div class="dial-wrap">
      <svg viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="90"></circle>
        <circle id="ringLevel" class="ring-level" cx="100" cy="100" r="90"></circle>
      </svg>
      <button id="talkBtn" type="button" disabled>TALK</button>
    </div>
    <div id="hint" class="hint">Connect to the rig to start a call</div>
  </div>

  <div class="transcript-wrap">
    <div class="transcript-label">
      <span>Transcript</span>
      <button id="clearBtn" type="button">clear</button>
    </div>
    <div id="transcript"><span class="placeholder">nothing said yet.</span></div>
  </div>

  <details class="advanced">
    <summary>Advanced</summary>
    <div class="advanced-body">
      <div class="setting-row">
        <label for="temperature">Temperature</label>
        <input id="temperature" type="range" min="0" max="1.5" step="0.05" value="0.7">
        <span id="temperatureReadout" class="readout">0.70</span>
      </div>
      <div class="setting-row">
        <label for="maxTokens">Max tokens</label>
        <input id="maxTokens" type="number" min="32" max="2048" step="16" value="512">
      </div>
      <div class="setting-row">
        <label for="volume">Playback vol.</label>
        <input id="volume" type="range" min="0" max="1.5" step="0.05" value="1">
        <span id="volumeReadout" class="readout">100%</span>
      </div>
    </div>
  </details>

  <div class="footnote">
    needs microphone access, allow it in your browser when asked. conversation memory resets upon disconnecting, during a call the ai can remember the last 5 messages.
  </div>
</div>

<script>
(function () {
  'use strict';

  // ---------- DOM ----------
  const led = document.getElementById('led');
  const serverUrlInput = document.getElementById('serverUrl');
  const connectBtn = document.getElementById('connectBtn');
  const talkBtn = document.getElementById('talkBtn');
  const ringLevel = document.getElementById('ringLevel');
  const hint = document.getElementById('hint');
  const transcript = document.getElementById('transcript');
  const clearBtn = document.getElementById('clearBtn');
  const temperatureInput = document.getElementById('temperature');
  const temperatureReadout = document.getElementById('temperatureReadout');
  const maxTokensInput = document.getElementById('maxTokens');
  const volumeInput = document.getElementById('volume');
  const volumeReadout = document.getElementById('volumeReadout');

  const RING_CIRCUMFERENCE = 2 * Math.PI * 90;
  ringLevel.style.strokeDasharray = String(RING_CIRCUMFERENCE);
  setRingLevel(0);

  const PLAYBACK_SAMPLE_RATE = 24000; // matches model_server.py OUTPUT_RATE
  const TARGET_INPUT_RATE = 16000;    // matches model_server.py's expected mic rate

  // ---------- app state ----------
  let ws = null;
  let appState = 'disconnected'; // disconnected | connecting | idle | recording | waiting
  let audioCtx = null;
  let playbackGain = null;
  let nextPlayTime = 0;
  let turnAudioStarted = false;

  // recording pipeline
  let mediaStream = null;
  let sourceNode = null;
  let processorNode = null;
  let analyserNode = null;
  let silentGain = null;
  let recordedChunks = [];
  let levelRAF = null;
  let hasReceivedAnyTokenThisTurn = false;
  let currentTurnTextEl = null;

  // ---------- helpers ----------
  function setState(next) {
    appState = next;
    switch (next) {
      case 'disconnected':
        led.className = 'led';
        connectBtn.textContent = 'Connect';
        connectBtn.classList.remove('is-connected');
        talkBtn.disabled = true;
        talkBtn.classList.remove('is-recording');
        talkBtn.textContent = 'TALK';
        ringLevel.classList.remove('mode-waiting');
        setRingLevel(0);
        hint.textContent = 'first press connect to start a new conversation';
        break;
      case 'connecting':
        led.className = 'led connecting';
        connectBtn.textContent = 'Cancel';
        connectBtn.classList.remove('is-connected');
        talkBtn.disabled = true;
        hint.textContent = 'Connecting…';
        break;
      case 'idle':
        led.className = 'led connected';
        connectBtn.textContent = 'Disconnect';
        connectBtn.classList.add('is-connected');
        talkBtn.disabled = false;
        talkBtn.classList.remove('is-recording');
        talkBtn.textContent = 'TALK';
        ringLevel.classList.remove('mode-waiting');
        setRingLevel(0);
        hint.textContent = 'press space or tap the button to talk';
        break;
      case 'recording':
        talkBtn.disabled = false;
        talkBtn.classList.add('is-recording');
        talkBtn.textContent = 'SEND';
        ringLevel.classList.remove('mode-waiting');
        hint.textContent = 'recording, press again to send message...';
        break;
      case 'waiting':
        talkBtn.disabled = true;
        talkBtn.classList.remove('is-recording');
        talkBtn.textContent = '···';
        ringLevel.classList.add('mode-waiting');
        setRingLevel(1);
        hint.textContent = 'waiting for response to finish...';
        break;
    }
  }

  function setRingLevel(l) {
    const clamped = Math.max(0, Math.min(1, l));
    ringLevel.style.strokeDashoffset = String(RING_CIRCUMFERENCE * (1 - clamped));
  }

  function ensureAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      playbackGain = audioCtx.createGain();
      playbackGain.gain.value = parseFloat(volumeInput.value);
      playbackGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    return audioCtx;
  }

  function appendTurnDivider(label) {
    if (transcript.querySelector('.placeholder')) transcript.innerHTML = '';
    const div = document.createElement('span');
    div.className = 'turn-divider';
    div.textContent = label;
    transcript.appendChild(div);
    const p = document.createElement('span');
    transcript.appendChild(p);
    currentTurnTextEl = p;
    transcript.scrollTop = transcript.scrollHeight;
  }

  function appendToken(text) {
    if (!currentTurnTextEl) appendTurnDivider('Response');
    currentTurnTextEl.textContent += text;
    transcript.scrollTop = transcript.scrollHeight;
  }

  function int16ToBase64(int16arr) {
    const bytes = new Uint8Array(int16arr.buffer, int16arr.byteOffset, int16arr.byteLength);
    let binary = '';
    const chunkSize = 0x8000;
    for (let i = 0; i < bytes.length; i += chunkSize) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
    }
    return btoa(binary);
  }

  function base64ToInt16(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new Int16Array(bytes.buffer);
  }

  // ---------- websocket ----------
  function connect() {
    const url = serverUrlInput.value.trim();
    if (!url) return;
    setState('connecting');
    try {
      ws = new WebSocket(url);
    } catch (e) {
      handleConnError('Could not open a connection to that address.');
      return;
    }
    ws.onopen = () => setState('idle');
    ws.onmessage = onSocketMessage;
    ws.onclose = () => {
      if (appState === 'recording') stopRecordingPipeline();
      setState('disconnected');
      ws = null;
    };
    ws.onerror = () => {
      handleConnError('Connection error — check the address and that the server is running.');
    };
  }

  function handleConnError(message) {
    led.className = 'led error';
    hint.textContent = message;
    talkBtn.disabled = true;
    connectBtn.textContent = 'Connect';
    connectBtn.classList.remove('is-connected');
    if (ws) { try { ws.close(); } catch (e) {} }
    ws = null;
    appState = 'disconnected';
  }

  function disconnect() {
    if (appState === 'recording') stopRecordingPipeline();
    if (ws) { try { ws.close(); } catch (e) {} }
    ws = null;
    setState('disconnected');
  }

  function onSocketMessage(event) {
    let data;
    try {
      data = JSON.parse(event.data);
    } catch (e) {
      console.warn('Could not parse server message', e);
      return;
    }

    if (typeof data.token === 'string') {
      appendToken(data.token);
    } else if (typeof data.audio === 'string') {
      schedulePlayback(data.audio);
    } else if (data.status === 'turn_completed') {
      turnAudioStarted = false;
      currentTurnTextEl = null;
      if (appState === 'waiting') setState('idle');
    } else if (typeof data.text === 'string') {
      // server-side error payload from generate_stream_gate
      appendTurnDivider('Server message');
      appendToken(data.text);
    }
  }

  function schedulePlayback(base64Audio) {
    const ctx = ensureAudioCtx();
    const int16 = base64ToInt16(base64Audio);
    if (int16.length === 0) return;
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

    const buffer = ctx.createBuffer(1, float32.length, PLAYBACK_SAMPLE_RATE);
    buffer.copyToChannel(float32, 0);

    const src = ctx.createBufferSource();
    src.buffer = buffer;
    src.connect(playbackGain);

    const now = ctx.currentTime;
    let startAt;
    if (!turnAudioStarted) {
      startAt = now + 0.15; // small cushion so the first chunk doesn't stutter
      nextPlayTime = startAt;
      turnAudioStarted = true;
    } else {
      startAt = Math.max(now, nextPlayTime);
    }
    src.start(startAt);
    nextPlayTime = startAt + buffer.duration;
  }

  // ---------- recording ----------
  async function startRecording() {
    if (appState !== 'idle') return;
    const ctx = ensureAudioCtx();

    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
      });
    } catch (e) {
      hint.textContent = 'Microphone access denied or unavailable.';
      return;
    }

    sourceNode = ctx.createMediaStreamSource(mediaStream);
    analyserNode = ctx.createAnalyser();
    analyserNode.fftSize = 256;

    processorNode = ctx.createScriptProcessor(4096, 1, 1);
    recordedChunks = [];
    processorNode.onaudioprocess = (e) => {
      const input = e.inputBuffer.getChannelData(0);
      recordedChunks.push(new Float32Array(input));
    };

    silentGain = ctx.createGain();
    silentGain.gain.value = 0;

    sourceNode.connect(analyserNode);
    sourceNode.connect(processorNode);
    processorNode.connect(silentGain);
    silentGain.connect(ctx.destination);

    setState('recording');
    runLevelMeter();
  }

  function runLevelMeter() {
    const data = new Uint8Array(analyserNode.fftSize);
    const tick = () => {
      if (appState !== 'recording') return;
      analyserNode.getByteTimeDomainData(data);
      let sumSquares = 0;
      for (let i = 0; i < data.length; i++) {
        const v = (data[i] - 128) / 128;
        sumSquares += v * v;
      }
      const rms = Math.sqrt(sumSquares / data.length);
      setRingLevel(Math.min(1, rms * 4));
      levelRAF = requestAnimationFrame(tick);
    };
    levelRAF = requestAnimationFrame(tick);
  }

  function stopRecordingPipeline() {
    if (levelRAF) cancelAnimationFrame(levelRAF);
    levelRAF = null;
    try { sourceNode && sourceNode.disconnect(); } catch (e) {}
    try { analyserNode && analyserNode.disconnect(); } catch (e) {}
    try { processorNode && processorNode.disconnect(); } catch (e) {}
    try { silentGain && silentGain.disconnect(); } catch (e) {}
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    sourceNode = null;
    analyserNode = null;
    processorNode = null;
    silentGain = null;
    mediaStream = null;
    setRingLevel(0);
  }

  async function stopRecordingAndSend() {
    if (appState !== 'recording') return;
    const ctx = audioCtx;
    const originalRate = ctx.sampleRate;
    stopRecordingPipeline();

    const totalLength = recordedChunks.reduce((sum, c) => sum + c.length, 0);
    if (totalLength === 0) {
      setState('idle');
      return;
    }
    const combined = new Float32Array(totalLength);
    let offset = 0;
    for (const chunk of recordedChunks) {
      combined.set(chunk, offset);
      offset += chunk.length;
    }
    recordedChunks = [];

    setState('waiting');
    hint.textContent = 'Processing recording…';

    let resampled;
    try {
      resampled = await resampleTo16k(combined, originalRate);
    } catch (e) {
      hint.textContent = 'Could not process the recording.';
      setState('idle');
      return;
    }

    const int16 = new Int16Array(resampled.length);
    for (let i = 0; i < resampled.length; i++) {
      const s = Math.max(-1, Math.min(1, resampled[i]));
      int16[i] = s < 0 ? s * 32768 : s * 32767;
    }

    const payload = {
      audio: int16ToBase64(int16),
      temperature: parseFloat(temperatureInput.value),
      max_new_tokens: parseInt(maxTokensInput.value, 10)
    };

    appendTurnDivider('You spoke — waiting on response');

    if (ws && ws.readyState === WebSocket.OPEN) {
      try {
        ws.send(JSON.stringify(payload));
        hint.textContent = 'Waiting for the model…';
      } catch (e) {
        hint.textContent = 'Failed to send audio.';
        setState('idle');
      }
    } else {
      hint.textContent = 'Not connected — reconnect and try again.';
      setState('disconnected');
    }
  }

  function resampleTo16k(float32Data, originalRate) {
    if (originalRate === TARGET_INPUT_RATE) return Promise.resolve(float32Data);
    const targetLength = Math.ceil(float32Data.length * TARGET_INPUT_RATE / originalRate);
    const offlineCtx = new OfflineAudioContext(1, targetLength, TARGET_INPUT_RATE);
    const tempBuffer = offlineCtx.createBuffer(1, float32Data.length, originalRate);
    tempBuffer.copyToChannel(float32Data, 0);
    const src = offlineCtx.createBufferSource();
    src.buffer = tempBuffer;
    src.connect(offlineCtx.destination);
    src.start(0);
    return offlineCtx.startRendering().then(rendered => rendered.getChannelData(0));
  }

  function toggleRecording() {
    if (appState === 'idle') startRecording();
    else if (appState === 'recording') stopRecordingAndSend();
  }

  // ---------- wiring ----------
  connectBtn.addEventListener('click', () => {
    if (appState === 'disconnected') connect();
    else disconnect();
  });

  talkBtn.addEventListener('click', toggleRecording);

  clearBtn.addEventListener('click', () => {
    transcript.innerHTML = '<span class="placeholder">nothing said yet.</span>';
    currentTurnTextEl = null;
  });

  temperatureInput.addEventListener('input', () => {
    temperatureReadout.textContent = parseFloat(temperatureInput.value).toFixed(2);
  });

  volumeInput.addEventListener('input', () => {
    const v = parseFloat(volumeInput.value);
    volumeReadout.textContent = Math.round(v * 100) + '%';
    if (playbackGain) playbackGain.gain.value = v;
  });

  document.addEventListener('keydown', (e) => {
    if (e.code !== 'Space' || e.repeat) return;
    const tag = document.activeElement && document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (appState !== 'idle' && appState !== 'recording') return;
    e.preventDefault();
    toggleRecording();
  });

  serverUrlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && appState === 'disconnected') connect();
  });

  window.addEventListener('beforeunload', () => {
    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  });

  setState('disconnected');
})();
</script>
</body>
